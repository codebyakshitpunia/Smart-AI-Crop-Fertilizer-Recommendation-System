<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Crop Recommender</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0px 0px 10px gray; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; }
        button { background-color: #28a745; color: white; padding: 10px; width: 100%; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .result { margin-top: 20px; padding: 15px; background: #e2e3e5; border-radius: 5px; font-weight: bold;}
    </style>
</head>
<body>

<div class="container">
    <h2>🌾 Crop & Fertilizer Recommender</h2>
    
    <form action="/predict" method="POST">
        <label>Nitrogen (N):</label>
        <input type="number" name="N" required>
        
        <label>Phosphorous (P):</label>
        <input type="number" name="P" required>
        
        <label>Potassium (K):</label>
        <input type="number" name="K" required>

        <label>Soil pH:</label>
        <input type="number" step="0.1" name="ph" required>

        <label>Soil Moisture:</label>
        <input type="number" name="moisture" required>

        <label>Soil Type:</label>
        <select name="soil_type" required>
            <option value="Sandy">Sandy</option>
            <option value="Loamy">Loamy</option>
            <option value="Black">Black</option>
            <option value="Red">Red</option>
            <option value="Clayey">Clayey</option>
        </select>

        <label>Your City (for weather):</label>
        <input type="text" name="city" required>

        <button type="submit">Get AI Recommendation</button>
    </form>

    {% if prediction_text %}
    <div class="result">
        {{ prediction_text | safe }}
    </div>
    {% endif %}
</div>

</body>
</html>
